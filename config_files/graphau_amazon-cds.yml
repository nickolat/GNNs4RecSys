experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/{0}/train.tsv
    validation_path: ../data/{0}/validation.tsv
    test_path: ../data/{0}/test.tsv
  binarize: True
  dataset: amazon-cds
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [Recall, nDCG]
  gpu: 0
  external_models_path: ../external/models/__init__.py
  models:
    external.GraphAU:
      meta:
        hyper_opt_alg: tpe
        hyper_max_evals: 20
        verbose: True
        save_weights: False
        save_recs: False
        validation_rate: 1
        validation_metric: Recall@20
        restore: False
      lr: [ loguniform,  -5.29831736655, -2.30258509299]
      factors: 32
      n_layers: [choice, [1, 2, 3, 4]]
      gamma_au: [quniform, 0, 2, 0.1]
      alpha_n: [quniform, 0, 2, 0.1]
      weight_decay: [loguniform, -97.697414907, -4.6051701860]
      decaying_base: 1.4
      batch_size: 2048
      epochs: 100
      normalize: True
      seed: 2022
      early_stopping:
        patience: 10
        mode: auto
        monitor: loss
        verbose: True
