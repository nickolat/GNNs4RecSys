experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/{0}/yang/train.tsv
    test_path: ../data/{0}/yang/validation.tsv
    validation_path: ../data/{0}/yang/validation.tsv
  binarize: True
  dataset: gowalla
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [Recall, nDCG]
  gpu: 0
  external_models_path: ../external/models/__init__.py
  models:
    external.XSimGCL:
      meta:
        hyper_opt_alg: tpe
        hyper_max_evals: 20
        verbose: True
        save_weights: False
        save_recs: False
        validation_rate: 1
        validation_metric: Recall@20
        restore: False
      lr: 0.001
      epochs: 20
      factors: 64
      batch_size: 2048
      l_w: 1e-4
      n_layers: [choice, [3, 4]]
      eps: [loguniform, -4.6051701860, -0.6931471806]
      reg_cl: [loguniform, -4.6051701860, 0]
      l_star: [choice, [1, 2, 3]]
      tau: 0.15
      seed: 42