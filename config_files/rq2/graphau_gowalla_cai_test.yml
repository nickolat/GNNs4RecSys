experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/{0}/cai/train_full.tsv
    test_path: ../data/{0}/cai/test.tsv
  binarize: True
  dataset: gowalla
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [Recall, nDCG]
  gpu: 0
  external_models_path: ../external/models/__init__.py
  models:
    external.GraphAU:
      meta:
        verbose: True
        save_weights: False
        save_recs: False
        validation_rate: 27
        validation_metric: Recall@20
        restore: False
      lr: 0.009151740875420717
      factors: 32
      n_layers: 2
      gamma_au: 1.5
      alpha_n: 1.9000000000000001
      weight_decay: 7.871477393672319e-11
      decaying_base: 1.4
      batch_size: 2048
      epochs: 27
      normalize: True
      seed: 2022
