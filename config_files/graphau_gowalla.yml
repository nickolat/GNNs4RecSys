experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/gowalla/split_graphau/train.tsv
    validation_path: ../data/gowalla/split_graphau/val.tsv
    test_path: ../data/gowalla/split_graphau/test.tsv
  binarize: True
  dataset: gowalla
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [Recall, nDCG]
  gpu: 0
  external_models_path: ../external/models/__init__.py
  models:
    external.GraphAU:
      meta:
        hyper_opt_alg: grid
        verbose: True
        save_weights: False
        save_recs: False
        validation_rate: 1
        validation_metric: Recall@20
        restore: False
        optimize_internal_loss: True  # final results on model with best loss
      lr: 0.1
      factors: 32
      n_layers: 2
      gamma_au: 1.7
      alpha_n: 0.1
      decaying_base: 1.4
      weight_decay: 0.0
      batch_size: 2048
      epochs: 1000
      normalize: True
      seed: 2022
      early_stopping:
        patience: 10
        mode: auto
        monitor: loss
        verbose: True
