experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/{0}/train.tsv
    test_path: ../data/{0}/test.tsv
    validation_path: ../data/{0}/validation.tsv
  binarize: True
  dataset: amazon-book
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [Recall, nDCG]
  gpu: 0
  external_models_path: ../external/models/__init__.py
  models:
    external.LightGCL:
      meta:
        hyper_opt_alg: tpe
        hyper_max_evals: 20
        verbose: True
        save_weights: False
        save_recs: False
        validation_rate: 1
        validation_metric: Recall@20
        restore: False
      lr: 1e-3
      epochs: 100
      factors: 64
      batch_size: 4096
      lambda1: [quniform, 0.1, 0.4, 0.1]
      lambda2: [loguniform, -97.697414907, -11.51292546]
      n_layers: [choice, [1, 2, 3]]
      temp: [quniform, 0.1, 0.5, 0.1]
      dropout: [choice, [0.0, 0.25]]
      q: 5
      seed: 42
