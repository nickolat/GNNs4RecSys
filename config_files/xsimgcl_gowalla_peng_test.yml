experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/{0}/peng/train_full.tsv
    test_path: ../data/{0}/peng/test.tsv
  binarize: True
  dataset: gowalla
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [Recall, nDCG]
  gpu: 0
  external_models_path: ../external/models/__init__.py
  models:
    external.XSimGCL:
      meta:
        verbose: True
        save_weights: False
        save_recs: False
        validation_rate: 11
        validation_metric: Recall@20
        restore: False
      lr: 0.001
      epochs: 11
      factors: 64
      batch_size: 2048
      l_w: 1e-4
      n_layers: 3
      eps: 0.23851278612521798
      reg_cl: 0.037694398761560624
      l_star: 1
      tau: 0.15
      seed: 42