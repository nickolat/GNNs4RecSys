experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/{0}/wang/train_full.tsv
    test_path: ../data/{0}/wang/test.tsv
  binarize: True
  dataset: gowalla
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [Recall, nDCG]
  gpu: 0
  external_models_path: ../external/models/__init__.py
  models:
    external.XSimGCL:
      meta:
        verbose: True
        save_weights: False
        save_recs: False
        validation_rate: 20
        validation_metric: Recall@20
        restore: False
      lr: 0.001
      epochs: 20
      factors: 64
      batch_size: 2048
      l_w: 1e-4
      n_layers: 4
      eps: 0.27819853568291336
      reg_cl: 0.11329731440613654
      l_star: 2
      tau: 0.15
      seed: 42